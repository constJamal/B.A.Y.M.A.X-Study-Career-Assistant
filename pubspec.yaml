name: baymax
description: "A new Flutter project."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0" # Updated for better compatibility with modern plugins

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.12.4
  http: ^1.2.1
  dio: ^5.4.3
  google_fonts: ^8.0.2
  intl: ^0.19.0

  # State Management & Dependency Injection
  riverpod: ^2.5.1
  flutter_riverpod: ^2.5.1

  # Models & Serialization
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0
  equatable: ^2.0.5

  # UI Components
  shimmer: ^3.0.0

  # Logging & Error Handling
  logger: ^2.2.0

  # Utilities
  uuid: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0

  # Code Generation
  build_runner: ^2.4.8
  freezed: ^2.4.5
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
